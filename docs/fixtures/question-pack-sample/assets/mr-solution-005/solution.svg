<svg xmlns="http://www.w3.org/2000/svg" width="240" height="120" viewBox="0 0 240 120" role="img" aria-label="Two quarter-shaded bars combining to one half">
  <rect width="240" height="120" fill="#ffffff"/>
  <g stroke="#1f3d7a" stroke-width="2" fill="none">
    <rect x="20" y="30" width="80" height="30"/>
    <rect x="140" y="30" width="80" height="30"/>
  </g>
  <rect x="20" y="30" width="20" height="30" fill="#c7d7f5"/>
  <rect x="140" y="30" width="20" height="30" fill="#c7d7f5"/>
  <text x="60" y="85" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#1f3d7a">1/4</text>
  <text x="180" y="85" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#1f3d7a">1/4</text>
  <text x="120" y="20" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#1f3d7a">= 1/2</text>
</svg>
